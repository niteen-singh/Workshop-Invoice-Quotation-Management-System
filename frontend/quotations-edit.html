<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Edit Quotation — Workshop IQ</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
    </head>
    <body>
        <div id="sidebar-placeholder"></div>

        <div id="main">
            <div id="topbar">
                <h4 id="topbar-title">Edit Quotation</h4>
                <div class="actions">
                    <a href="/quotations.html" role="button" class="secondary"
                        >Cancel</a
                    >
                    <button onclick="saveQuotation()" id="save-btn">
                        Save changes
                    </button>
                </div>
            </div>

            <div id="content">
                <!-- Mandatory fields -->
                <div class="form-section">
                    <div class="form-section-title">Quotation details</div>
                    <div class="invoice-meta-grid">
                        <div class="field-group">
                            <label class="field-label">Customer *</label>
                            <select id="customer-select">
                                <option value="">Loading…</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Quote # *</label>
                            <input type="text" id="quote-number" />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Quote date *</label>
                            <input type="date" id="quote-date" />
                        </div>
                        <div class="field-group">
                            <label class="field-label">Valid until</label>
                            <input type="date" id="valid-until" />
                        </div>
                        <div class="field-group" style="grid-column: 1/-1">
                            <label class="field-label">Subject</label>
                            <input
                                type="text"
                                id="subject"
                                placeholder="e.g. Supply of MS components as per drawing"
                            />
                        </div>
                        <div class="field-group" style="grid-column: 1/-1">
                            <label class="field-label">Kind attention</label>
                            <input
                                type="text"
                                id="attention"
                                placeholder="e.g. Mr. Sharma / Purchase Dept"
                            />
                        </div>
                    </div>
                </div>

                <!-- Line items -->
                <div class="form-section">
                    <div class="form-section-title">Line items</div>
                    <div
                        style="
                            overflow-x: auto;
                            border: 1px solid var(--border);
                            border-radius: 16px;
                        "
                    >
                        <table class="line-items-table">
                            <thead>
                                <tr>
                                    <th style="width: 36px; text-align: center">
                                        #
                                    </th>
                                    <th>Description</th>
                                    <th style="width: 110px">HSN code</th>
                                    <th style="width: 80px">Qty</th>
                                    <th style="width: 120px">Unit price (₹)</th>
                                    <th style="width: 110px; text-align: right">
                                        Amount (₹)
                                    </th>
                                    <th style="width: 40px"></th>
                                </tr>
                            </thead>
                            <tbody id="line-items-body"></tbody>
                        </table>
                        <button onclick="addRow()" class="add-row-btn">
                            + Add row
                            <span
                                id="row-counter"
                                style="
                                    margin-left: auto;
                                    color: var(--muted);
                                    font-size: 0.8rem;
                                "
                            >
                                0 / 15
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Total -->
                <div
                    style="
                        display: flex;
                        justify-content: flex-end;
                        margin-bottom: 1.5rem;
                    "
                >
                    <table class="totals-table">
                        <tr class="grand-row">
                            <td><strong>Grand total</strong></td>
                            <td id="t-grand"><strong>₹0.00</strong></td>
                        </tr>
                    </table>
                </div>

                <!-- Notes -->
                <div class="form-section">
                    <div class="field-group">
                        <label class="field-label">Notes</label>
                        <input
                            type="text"
                            id="notes"
                            placeholder="Any additional notes…"
                        />
                    </div>
                </div>
            </div>
        </div>

        <script src="/assets/js/api.js"></script>
        <script src="/assets/js/layout.js"></script>
        <script src="/assets/js/pages/quotations-edit.js"></script>
        <script>
            loadSidebar("quotations");
        </script>
    </body>
</html>
