server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;   # Docker's internal DNS
        set $backend http://backend:8000;
        proxy_pass         $backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}