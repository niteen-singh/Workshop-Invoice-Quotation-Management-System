<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Invoice — Workshop IQ</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
    </head>
    <body>
        <div id="sidebar-placeholder"></div>

        <div id="main">
            <div id="topbar">
                <h4 id="topbar-title">Invoice</h4>
                <div class="actions">
                    <a href="/invoices.html" role="button" class="secondary"
                        >← Back</a
                    >
                    <button id="edit-btn">Edit</button>
                    <button id="status-btn" onclick="cycleStatus()">
                        Mark as paid
                    </button>
                    <button
                        id="delete-btn"
                        onclick="deleteInvoice()"
                        style="border-color: #6b2a2a; color: #f09a9a"
                    >
                        Delete
                    </button>
                    <button id="pdf-btn" onclick="downloadPdf()">
                        ⬇ Download PDF
                    </button>
                </div>
            </div>

            <div id="content">
                <div
                    id="loading"
                    style="
                        text-align: center;
                        color: var(--muted);
                        padding: 3rem;
                    "
                >
                    Loading…
                </div>
                <div id="invoice-detail" style="display: none">
                    <!-- Meta cards -->
                    <div class="view-meta-grid">
                        <div class="view-meta-card">
                            <div class="view-meta-label">Customer</div>
                            <div class="view-meta-value" id="v-customer"></div>
                        </div>
                        <div class="view-meta-card">
                            <div class="view-meta-label">Invoice #</div>
                            <div
                                class="view-meta-value"
                                id="v-number"
                                style="font-family: monospace"
                            ></div>
                        </div>
                        <div class="view-meta-card">
                            <div class="view-meta-label">Invoice date</div>
                            <div class="view-meta-value" id="v-date"></div>
                        </div>
                        <div class="view-meta-card">
                            <div class="view-meta-label">Due date</div>
                            <div class="view-meta-value" id="v-due"></div>
                        </div>
                        <div class="view-meta-card">
                            <div class="view-meta-label">Status</div>
                            <div class="view-meta-value" id="v-status"></div>
                        </div>
                        <div class="view-meta-card">
                            <div class="view-meta-label">Total amount</div>
                            <div
                                class="view-meta-value"
                                id="v-total"
                                style="font-size: 1.4rem; font-weight: 700"
                            ></div>
                        </div>
                    </div>

                    <!-- Optional fields — shown only if present -->
                    <div
                        id="optional-meta"
                        class="form-section"
                        style="display: none"
                    >
                        <div class="form-section-title">Additional details</div>
                        <div
                            id="optional-meta-content"
                            style="
                                display: grid;
                                grid-template-columns: 1fr 1fr 1fr;
                                gap: 1rem;
                            "
                        ></div>
                    </div>

                    <!-- Line items -->
                    <div class="form-section">
                        <div class="form-section-title">Line items</div>
                        <div style="overflow-x: auto">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 36px">#</th>
                                        <th>Description</th>
                                        <th
                                            style="
                                                width: 110px;
                                                text-align: center;
                                            "
                                        >
                                            HSN
                                        </th>
                                        <th
                                            style="
                                                width: 80px;
                                                text-align: center;
                                            "
                                        >
                                            GST %
                                        </th>
                                        <th
                                            style="
                                                width: 80px;
                                                text-align: center;
                                            "
                                        >
                                            Qty
                                        </th>
                                        <th
                                            style="
                                                width: 110px;
                                                text-align: right;
                                            "
                                        >
                                            Rate (₹)
                                        </th>
                                        <th
                                            style="
                                                width: 120px;
                                                text-align: right;
                                            "
                                        >
                                            Total (₹)
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="v-line-items"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Totals -->
                    <div
                        style="
                            display: flex;
                            justify-content: flex-end;
                            margin-bottom: 1.5rem;
                        "
                    >
                        <table class="totals-table">
                            <tr>
                                <td>Subtotal</td>
                                <td id="v-subtotal">—</td>
                            </tr>
                            <tr>
                                <td>CGST</td>
                                <td id="v-cgst">—</td>
                            </tr>
                            <tr>
                                <td>SGST</td>
                                <td id="v-sgst">—</td>
                            </tr>
                            <tr>
                                <td>Round off</td>
                                <td id="v-roundoff">—</td>
                            </tr>
                            <tr class="grand-row">
                                <td><strong>Grand total</strong></td>
                                <td id="v-grand"><strong>—</strong></td>
                            </tr>
                        </table>
                    </div>

                    <!-- Notes -->
                    <div
                        id="notes-section"
                        class="form-section"
                        style="display: none"
                    >
                        <div class="form-section-title">Notes / terms</div>
                        <div
                            id="v-notes"
                            style="color: var(--muted); font-size: 0.9rem"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <script src="/assets/js/api.js"></script>
        <script src="/assets/js/layout.js"></script>
        <script src="/assets/js/pages/invoices-view.js"></script>
        <script>
            loadSidebar("invoices");
        </script>
    </body>
</html>
