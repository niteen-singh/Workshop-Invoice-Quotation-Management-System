<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quotations — Workshop IQ</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
    </head>
    <body>
        <div id="sidebar-placeholder"></div>
        <div id="main">
            <div id="topbar">
                <h4>Quotations</h4>
                <div class="actions">
                    <a href="/quotations-new.html" role="button"
                        >+ New quotation</a
                    >
                </div>
            </div>
            <div id="content">
                <div class="search-bar">
                    <span class="search-icon">⌕</span>
                    <input
                        type="search"
                        id="search"
                        placeholder="Search by quotation # or customer…"
                        oninput="filterTable(this.value)"
                    />
                    <span id="quote-count" class="search-count">Loading…</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Quote #</th>
                            <th>Customer</th>
                            <th>Subject</th>
                            <th>Date</th>
                            <th style="text-align: right">Amount</th>
                            <th style="text-align: center">Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="quotes-tbody">
                        <tr>
                            <td
                                colspan="7"
                                style="text-align: center; color: var(--muted)"
                            >
                                Loading…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <script src="/assets/js/api.js"></script>
        <script src="/assets/js/layout.js"></script>
        <script src="/assets/js/pages/quotations.js"></script>
        <script>
            loadSidebar("quotations");
        </script>
    </body>
</html>
