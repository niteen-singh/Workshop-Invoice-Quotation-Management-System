<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Customers — Workshop IQ</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
    </head>
    <body>
        <!-- Sidebar injected here -->
        <div id="sidebar-placeholder"></div>

        <!-- Main -->
        <div id="main">
            <div id="topbar">
                <h4>Customers</h4>
                <div class="actions">
                    <button onclick="openModal()">+ &nbsp;Add customer</button>
                </div>
            </div>

            <div id="content">
                <!-- Search bar -->
                <div class="search-bar">
                    <span class="search-icon">⌕</span>
                    <input
                        type="search"
                        id="search"
                        placeholder="Search by name, phone, or GSTIN…"
                        oninput="filterTable(this.value)"
                    />
                    <span id="customer-count" class="search-count"
                        >Loading…</span
                    >
                </div>

                <!-- Table -->
                <table id="customers-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>GSTIN</th>
                            <th>Since</th>
                            <th>Options</th>
                        </tr>
                    </thead>
                    <tbody id="customers-tbody">
                        <tr>
                            <td
                                colspan="4"
                                style="text-align: center; color: var(--muted)"
                            >
                                Loading…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Customer Modal -->
        <dialog id="customer-modal">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="closeModal()"
                    ></button>
                    <h5>Add customer</h5>
                </header>
                <form id="customer-form" onsubmit="submitCustomer(event)">
                    <label
                        >Name *<input
                            name="name"
                            required
                            placeholder="e.g. Patil Engineering"
                    /></label>
                    <label
                        >Phone<input name="phone" placeholder="98765 43210"
                    /></label>
                    <label
                        >Email<input
                            name="email"
                            type="email"
                            placeholder="contact@example.com"
                    /></label>
                    <label
                        >GSTIN<input
                            name="gstin"
                            placeholder="27AABCP1234A1Z5"
                            style="font-family: monospace"
                    /></label>
                    <label
                        >Address<textarea
                            name="address"
                            rows="2"
                            placeholder="Shop / unit address"
                        ></textarea>
                    </label>
                </form>
                <footer>
                    <button class="secondary" onclick="closeModal()">
                        Cancel
                    </button>
                    <button type="submit" form="customer-form" id="save-btn">
                        Save customer
                    </button>
                </footer>
            </article>
        </dialog>

        <!-- Edit Customer Modal -->
        <dialog id="customer-edit-modal">
            <article>
                <header>
                    <button
                        aria-label="Close"
                        rel="prev"
                        onclick="closeEditModal()"
                    ></button>
                    <h5>Edit customer</h5>
                </header>

                <form id="customer-edit-form" onsubmit="submitEdit(event)">
                    <label
                        >Name *
                        <input
                            id="edit-name"
                            name="name"
                            required
                            placeholder="e.g. Patil Engineering"
                        />
                    </label>
                    <label
                        >Phone
                        <input
                            id="edit-phone"
                            name="phone"
                            placeholder="98765 43210"
                        />
                    </label>
                    <label
                        >Email
                        <input
                            id="edit-email"
                            name="email"
                            type="email"
                            placeholder="contact@example.com"
                        />
                    </label>
                    <label
                        >GSTIN
                        <input
                            id="edit-gstin"
                            name="gstin"
                            placeholder="27AABCP1234A1Z5"
                            style="font-family: monospace"
                        />
                    </label>
                    <label
                        >Address
                        <textarea
                            id="edit-address"
                            name="address"
                            rows="2"
                            placeholder="Shop / unit address"
                        ></textarea>
                    </label>
                </form>

                <footer>
                    <button
                        type="submit"
                        form="customer-edit-form"
                        id="edit-save-btn"
                    >
                        Save changes
                    </button>
                    <button class="secondary" onclick="closeEditModal()">
                        Cancel
                    </button>
                </footer>
            </article>
        </dialog>

        <script src="/assets/js/api.js"></script>
        <script src="/assets/js/layout.js"></script>
        <script src="/assets/js/pages/customers.js"></script>
        <script>
            loadSidebar("customers");
        </script>
    </body>
</html>
