<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create account — Workshop IQ</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: var(--bg);
                margin: 0;
            }

            .auth-card {
                width: 100%;
                max-width: 400px;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 24px;
                padding: 2.5rem;
            }

            .auth-logo {
                text-align: center;
                margin-bottom: 2rem;
            }

            .auth-logo h1 {
                font-size: 1.8rem;
                font-weight: 700;
                color: white;
                margin-bottom: 0.25rem;
            }

            .auth-logo p {
                font-size: 0.85rem;
                color: var(--muted);
            }

            .auth-field {
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
                margin-bottom: 1rem;
            }

            .auth-field label {
                font-size: 0.82rem;
                color: var(--muted);
            }

            .auth-field input {
                background: var(--panel-2);
                border: 1px solid var(--border);
                border-radius: 12px;
                color: var(--text);
                padding: 0.75rem 1rem;
                font-size: 0.95rem;
                outline: none;
                transition: border-color 0.2s;
            }

            .auth-field input:focus {
                border-color: rgba(255, 255, 255, 0.3);
            }

            .auth-btn {
                width: 100%;
                padding: 0.85rem;
                border-radius: 12px;
                border: none;
                background: white;
                color: #000;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                margin-top: 0.5rem;
                transition: opacity 0.2s;
            }

            .auth-btn:hover {
                opacity: 0.88;
            }
            .auth-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .auth-error {
                display: none;
                background: #3d1a1a;
                border: 1px solid #6b2a2a;
                border-radius: 10px;
                color: #f09a9a;
                font-size: 0.85rem;
                padding: 0.7rem 1rem;
                margin-top: 1rem;
                text-align: center;
            }

            .auth-footer {
                text-align: center;
                margin-top: 1.5rem;
                font-size: 0.82rem;
                color: var(--muted);
            }

            .auth-footer a {
                color: white;
                text-decoration: none;
            }

            .auth-footer a:hover {
                text-decoration: underline;
            }

            .hint {
                font-size: 0.78rem;
                color: var(--muted);
                margin-top: 0.25rem;
            }
        </style>
    </head>
    <body>
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Workshop IQ</h1>
                <p>Create your account</p>
            </div>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="auth-field">
                    <label>Your name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="e.g. Niteen Singh"
                        required
                    />
                </div>
                <div class="auth-field">
                    <label>Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        required
                    />
                </div>
                <div class="auth-field">
                    <label>Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Minimum 8 characters"
                        required
                    />
                    <span class="hint">At least 8 characters</span>
                </div>
                <div class="auth-field">
                    <label>Confirm password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <button type="submit" class="auth-btn" id="signup-btn">
                    Create account
                </button>

                <div class="auth-error" id="signup-error"></div>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>

        <script src="/assets/js/api.js"></script>
        <script src="/assets/js/pages/signup.js"></script>
    </body>
</html>
